name: Protect Skills Directory

on:
  pull_request:
  push:

jobs:
  protect-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Diff Range
        id: diff-range
        shell: bash
        run: |
          set -euo pipefail

          HEAD_SHA="${GITHUB_SHA}"

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            if [[ -z "${BASE_SHA}" || "${BASE_SHA}" == "0000000000000000000000000000000000000000" ]]; then
              DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
              git fetch origin "${DEFAULT_BRANCH}" --depth=1
              BASE_SHA="$(git merge-base "${HEAD_SHA}" "origin/${DEFAULT_BRANCH}")"
            fi
          fi

          echo "base_sha=${BASE_SHA}" >> "${GITHUB_OUTPUT}"
          echo "head_sha=${HEAD_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Check Protected Directory
        run: |
          python3 tools/check_protected_paths.py \
            --mode range \
            --base "${{ steps.diff-range.outputs.base_sha }}" \
            --head "${{ steps.diff-range.outputs.head_sha }}"
